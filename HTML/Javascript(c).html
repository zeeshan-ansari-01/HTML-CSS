<!DOCTYPE html>
<html>
<head>
<title>Prime Numbers between 1 to 100</title>
<script language="JavaScript" type="text/JavaScript">
var i;
var j;
for(i=2;i<=100;i++)
{
var flag=0;
for(j=2;j<=i/2;j++)
{
if(i%j==0)
{
flag=1;
break;
}
}
if(flag==0)
{
document.write(i+"<br>");
}
}
</script>
</head>
<body>
</body>
</html>
