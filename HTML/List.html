<!doctype html>
<html>
<head>
<title>Nested List with Internal,External and Inline Stylesheet</title>
<link rel="stylesheet" type="text/css" href="Pink.css">
<style type="text/css">
fruits{color:blue}
vegetables{color:yellow}
</style>
</head>
<body>
<ul style="list-style-type:circle">
<li style="color:red">Fruits</li>
<ol type=I class="fruits">
<li>Banana</li>
<li>Apple</li>
<li>Mango</li>
</ol>
<li style="color:red">Vegetables</li>
<ol type=i class="vegetables">
<li>Tomato</li>
<li>Potato</li>
<li>Carrot</li>
</ol>
</ul>
</body>
</html>
