<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Position</title>
</head>
<style>
    .item1{
        position: absolute;
        top: 20px;
        left: 0px;
        border: 1px solid green;
        width: 55px;
        height: 55px;
    }

    .item2{
        position: absolute;
        top: 200px;
        left: 0px;
        border: 1px solid green;
        width: 55px;
        height: 55px;
    }

    .item3{
        position: absolute;
        top: 400px;
        left: 0px;
        border: 1px solid green;
        width: 55px;
        height: 55px;
    }

    .item4{
        position: absolute;
        top: 600px;
        left: 0px;
        border: 1px solid green;
        width: 55px;
        height: 55px;
    }

    .item5{
        position: absolute;
        bottom: 0px;
        right: 0px;
        border: 1px solid green;
        width: 55px;
        height: 55px;
    }

</style>
<body>
    <div class="item1">Box 1</div>
    <div class="item2">Box 2</div>
    <div class="item3">Box 3</div>
    <div class="item4">Box 4</div>
    <div class="item5">Box 5</div>
</body>
</html>
