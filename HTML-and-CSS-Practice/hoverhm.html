<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Hover</title>
</head>
<style>
    body{
        display: flex;
        justify-content: center;
        align-items: center;
        padding-top: 50px;
        background-color: bisque;
    }
    button{
        text-align: center;
        background-color: blue;
        color: white;
    }
    
    button:hover{
        cursor: pointer;
        background: white;
        color: blue;
    }
</style>
<body>
    <Button>BUTTON</Button>
</body>
</html>
