<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Class</title>
</head>
<style>
    .c1:first-child{
        background-color: aquamarine;
    }
    li:nth-child(2n+1){
        background-color: dodgerblue;
    }
</style>
<body>
    <p class="c1">Pesudo First Child </p>
    <p class="c1">Pseudo Second Child </p>
    <hr>
    <ul>
        <li>Hello</li>
        <li>Hello</li>
        <li>Hello</li>
        <li>Hello</li>
        <li>Hello</li>
        <li>Hello</li>
    </ul>
</body>
</html>
