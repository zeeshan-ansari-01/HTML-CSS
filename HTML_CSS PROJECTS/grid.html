     .container {
        display: grid;
        grid-template-rows: repeat(3, 50px);
        grid-template-columns: 90px 90px 90px;
    }

    .box {
        background: dodgerblue;
        color: white;
        border: 1px solid white;
    }
</style>

</div>   -->

        <div class="box">Box 1</div>

    </div>
